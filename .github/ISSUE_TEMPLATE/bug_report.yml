name: Bug Report
description: Report a bug in focal.nvim
labels: [bug]
body:
  - type: input
    id: neovim-version
    attributes:
      label: Neovim version
      description: "Output of `nvim --version` (first line)"
      placeholder: "NVIM v0.10.0"
    validations:
      required: true

  - type: input
    id: terminal
    attributes:
      label: Terminal emulator
      description: "Name and version of your terminal"
      placeholder: "kitty 0.35.1"
    validations:
      required: true

  - type: textarea
    id: focal-status
    attributes:
      label: ":FocalStatus output"
      description: "Run `:FocalStatus` and paste the output here"
      render: lua
    validations:
      required: true

  - type: textarea
    id: checkhealth
    attributes:
      label: ":checkhealth focal output"
      description: "Run `:checkhealth focal` and paste the output here"
      render: text
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: "Minimal steps to trigger the bug"
      placeholder: |
        1. Open nvim with focal.nvim configured
        2. Open neo-tree
        3. Hover over an image file
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: "What you expected to happen"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: "What actually happened"
    validations:
      required: true
